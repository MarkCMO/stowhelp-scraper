name: Scrape Storage Facilities

# Continuous execution: the last step in each run dispatches the next run.
# Result: a self-sustaining loop that runs 24/7 with zero gaps between runs.
# Throughput: ~5 items per run × 8-10 runs/hour = 40-50 listings/hour.
#
# The hourly schedule is a SAFETY NET - if the chain ever breaks (runner
# failure, GH outage, misconfiguration), this restarts the loop at the top
# of every hour. Same story for the Netlify email-cron backup trigger.

on:
  schedule:
    # Fallback only - restart the chain if it ever breaks.
    - cron: '0 * * * *'
  workflow_dispatch:

# Required so the built-in GITHUB_TOKEN can re-dispatch this workflow.
# No PAT needed for the self-trigger path.
permissions:
  actions: write
  contents: read

# Serialize runs so the safety-net cron never starts a duplicate scraper
# while the continuous chain is already executing. cancel-in-progress:false
# means a conflicting trigger waits instead of killing the running scrape.
concurrency:
  group: scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Hard cap per run - the scraper finishes in ~6-7 min, this is headroom.
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Install Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Chromium system deps (from cache)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          SCRAPER_BATCH_SIZE: '5'
          SCRAPER_PER_QUERY_MAX: '15'
          SCRAPER_DEADLINE_MS: '420000'
        run: node scripts/run.js

      # The heart of the continuous loop. if:always() means we re-trigger
      # EVEN IF the scraper step failed - we never want the chain to break
      # just because one run hit an error. The hourly fallback schedule
      # will catch us if somehow this step itself fails.
      - name: Dispatch next run (continuous loop)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/scraper.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "Next run dispatched - scraper loop continues."
