name: Scrape Storage Facilities

on:
  schedule:
    # Every 15 minutes. With batch=5 + 10min timeout, runs finish in
    # 5-7 min leaving ~8 min buffer before the next scheduled tick.
    # This spacing is critical: GitHub skips scheduled runs if the
    # previous one is still executing when the next tick arrives.
    - cron: '*/15 * * * *'
  workflow_dispatch:

# Serialize runs so a long run can't cause the next scheduled tick to
# overlap (and get silently dropped). cancel-in-progress:false means a
# late tick waits for the current run instead of killing it.
concurrency:
  group: scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Hard cap below the 15-min cron interval so we never spill into
    # the next window. If something hangs, the job is killed at 10 min.
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Install Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Chromium system deps (from cache)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          # Pulled back from 10 -> 5 so each run finishes well under the 15-min
          # cron window. 5 items * 4 runs/hr = 20 listings/hr consistent
          # (vs the old 10 items * 0.3 runs/hr actual = 3 listings/hr).
          SCRAPER_BATCH_SIZE: '5'
          # Pulled back from 20 -> 15: still broad coverage, less time per query.
          SCRAPER_PER_QUERY_MAX: '15'
          # Internal deadline 7 min - gives Chromium a chance to wrap up
          # gracefully before the hard 10-min GitHub timeout.
          SCRAPER_DEADLINE_MS: '420000'
        run: node scripts/run.js
